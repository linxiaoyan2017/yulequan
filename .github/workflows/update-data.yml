name: 🕷️ Update Drama Graph Data

on:
  # 每周一 00:00 CST（= UTC 周日 16:00）
  schedule:
    - cron: "0 16 * * 0"
  # 支持手动触发（方便调试）
  workflow_dispatch:
    inputs:
      force_full:
        description: "强制全量重爬（忽略已有缓存）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  crawl-and-deploy:
    name: Crawl Douban & Update JSON
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ── 1. 检出仓库 ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. 缓存爬虫原始数据（断点续爬加速）────────────────
      - name: Cache raw crawl data
        uses: actions/cache@v4
        with:
          path: star-drama-graph/scripts/data/raw
          key: raw-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            raw-data-${{ runner.os }}-

      # ── 3. 配置 Python ───────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: star-drama-graph/scripts/requirements.txt

      # ── 3. 安装 Python 依赖 ──────────────────────────────────
      - name: Install Python dependencies
        working-directory: star-drama-graph/scripts
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. 安装 Playwright 浏览器 ────────────────────────────
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      # ── 5. 创建数据目录 ──────────────────────────────────────────
      - name: Prepare data directories
        run: |
          mkdir -p star-drama-graph/scripts/data/raw
          mkdir -p star-drama-graph/public/data

      # ── 6. 爬取剧集列表 ─────────────────────────────────────
      - name: Crawl drama list
        working-directory: star-drama-graph/scripts
        run: python crawl_list.py
        env:
          FORCE_FULL: ${{ github.event.inputs.force_full || 'false' }}

      # ── 7. 爬取剧集详情 + 主演信息 ──────────────────────────
      - name: Crawl drama details & cast
        working-directory: star-drama-graph/scripts
        run: python crawl_detail.py

      # ── 8. 构建图谱 JSON（头像用豆瓣 CDN URL，无需下载）────
      - name: Build graph JSON
        working-directory: star-drama-graph/scripts
        run: python build_graph.py

      # ── 9. 更新 meta.json 时间戳 ────────────────────────────
      - name: Update meta.json
        working-directory: star-drama-graph
        run: |
          python3 - <<'EOF'
          import json, datetime
          from pathlib import Path

          nodes = json.loads(Path("public/data/nodes.json").read_text())
          edges = json.loads(Path("public/data/edges.json").read_text())

          meta = {
            "last_updated": datetime.datetime.utcnow().strftime("%Y-%m-%d"),
            "node_count": len(nodes),
            "edge_count": len(edges),
          }
          Path("public/data/meta.json").write_text(
            json.dumps(meta, ensure_ascii=False, indent=2)
          )
          print(f"meta updated: {meta}")
          EOF

      # ── 11. 提交变更到 main ──────────────────────────────────
      - name: Commit & push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            star-drama-graph/public/data/nodes.json \
            star-drama-graph/public/data/edges.json \
            star-drama-graph/public/data/meta.json
          # 仅在有变更时才提交
          git diff --staged --quiet || \
            git commit -m "chore(data): auto-update graph data $(date -u +%Y-%m-%d)" && \
            git push

  # ── 失败告警 Job ─────────────────────────────────────────────
  notify-on-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: crawl-and-deploy
    if: failure()
    steps:
      - name: Send failure notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ [明星剧缘图谱] 数据更新失败 - ${{ github.run_id }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: GitHub Actions <${{ secrets.MAIL_USERNAME }}>
          body: |
            自动数据更新任务失败 🚨

            工作流：${{ github.workflow }}
            运行 ID：${{ github.run_id }}
            触发时间：${{ github.event.head_commit.timestamp }}
            失败原因：请查看 Actions 日志

            🔗 查看详情：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}